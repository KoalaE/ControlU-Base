name: CI Pipeline

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore test1.sln

      - name: Build
        run: dotnet build test1.sln --no-restore

      - name: Test
        run: dotnet test test1.sln --no-build --verbosity normal
        
